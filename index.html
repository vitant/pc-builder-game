<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖥️ Сборщик ПК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b4e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .header {
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #ff006e);
            padding: 12px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .level-info {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .level-badge {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .money-display {
            background: linear-gradient(135deg, #059669, #10b981);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .money-display.warning {
            background: linear-gradient(135deg, #d97706, #f59e0b);
        }
        
        .money-display.danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }
        
        .game-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 15px;
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @media (max-width: 900px) {
            .game-container {
                grid-template-columns: 1fr;
            }
        }
        
        .pc-preview {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .pc-title {
            color: #7c3aed;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .pc-visual {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .pc-case {
            width: 140px;
            height: 220px;
            background: linear-gradient(180deg, #3d3d3d, #2a2a2a);
            border-radius: 10px 10px 5px 5px;
            border: 3px solid #555;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }
        
        .pc-case::before {
            content: '';
            position: absolute;
            top: 8px;
            width: 40px;
            height: 25px;
            background: #444;
            border-radius: 3px;
        }
        
        .pc-case::after {
            content: '';
            position: absolute;
            bottom: 15px;
            width: 100px;
            height: 80px;
            background: repeating-linear-gradient(0deg, #333, #333 4px, #444 4px, #444 8px);
            border-radius: 3px;
        }
        
        .pc-led {
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            right: 12px;
        }
        
        .pc-led.on {
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        
        .pc-led.incompatible {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }
        
        .compatibility-msg {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        
        .compatibility-msg.ok {
            background: rgba(16,185,129,0.3);
            color: #10b981;
        }
        
        .compatibility-msg.error {
            background: rgba(239,68,68,0.3);
            color: #ef4444;
        }
        
        .power-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .power-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(239,68,68,0.5);
        }
        
        .power-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .power-btn.success {
            background: linear-gradient(135deg, #059669, #10b981);
        }
        
        .shop-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .shop-title {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .component-category {
            margin-bottom: 15px;
        }
        
        .category-title {
            color: #f59e0b;
            font-size: 0.85rem;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .category-title:hover {
            color: #fbbf24;
        }
        
        .component-item {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .component-item:hover {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        
        .component-item.selected {
            border-color: #10b981;
            background: rgba(16,185,129,0.2);
        }
        
        .component-item.incompatible {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #ef4444 !important;
        }
        
        .component-name {
            font-size: 0.8rem;
        }
        
        .component-price {
            color: #10b981;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .component-specs {
            font-size: 0.65rem;
            color: #888;
            margin-top: 2px;
        }
        
        .selected-components {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .selected-title {
            color: #10b981;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .selected-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .selected-item:last-child {
            border-bottom: none;
        }
        
        .selected-item.incompatible {
            color: #ef4444;
        }
        
        .sell-btn {
            margin-top: 15px;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sell-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(124,58,237,0.5);
        }
        
        .sell-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            border: 3px solid #7c3aed;
        }
        
        .result-popup.show {
            display: block;
            animation: popupIn 0.5s;
        }
        
        @keyframes popupIn {
            from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .result-emoji { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.5rem; margin-bottom: 10px; }
        .result-text { font-size: 1rem; color: #888; margin-bottom: 15px; }
        .result-money { font-size: 2rem; color: #10b981; font-weight: bold; }
        .result-money.negative { color: #ef4444; }
        
        .close-btn, .next-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .next-btn {
            background: linear-gradient(135deg, #059669, #10b981);
            margin-left: 10px;
        }
        
        .log-section {
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .log-box {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 10px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 0.75rem;
        }
        
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-info { color: #00d4ff; }
        
        .win-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0f23, #1a1a3e, #2d1b4e);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
        }
        
        .win-screen.show { display: flex; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .win-title {
            font-size: 3rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        
        .win-stats { font-size: 1.2rem; color: #888; margin-bottom: 30px; }
        
        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .status-icons {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        
        .status-icon {
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
        }
        
        .status-icon.ok { background: rgba(16,185,129,0.3); color: #10b981; }
        .status-icon.error { background: rgba(239,68,68,0.3); color: #ef4444; }
    </style>
</head>

                </div>
                <button class="sell-btn" id="sellBtn" onclick="sellPC()" disabled>💰 ПРОДАТЬ ПК</button>
            </div>
        </div>
    </div>
    
    <div class="log-section">

    <div class="result-popup" id="resultPopup">

        <button class="next-btn" id="nextBtn" onclick="nextLevel()">📢 СЛЕДУЮЩИЙ УРОВЕНЬ</button>
    </div>
    
    <div class="win-screen" id="winScreen">

                    Case: [
                        { id: 'case9', name: 'Pro Workstation Tower', price: 20000 },
                        { id: 'case10', name: 'Ultimate Full Tower', price: 35000 }
                    ]
                }
            }
        ];

        let currentLevel = 0;
        let totalMoney = 0;
        let selectedComponents = { CPU: null, Motherboard: null, RAM: null, GPU: null, SSD: null, PSU: null, Case: null };

        const categoryIcons = { CPU: '💻', Motherboard: '🔲', RAM: '📦', GPU: '🎮', SSD: '💾', PSU: '⚡', Case: '📦' };
        const categoryNames = { CPU: 'Процессор', Motherboard: 'Материнская плата', RAM: 'Оперативная память', GPU: 'Видеокарта', SSD: 'SSD диск', PSU: 'Блок питания', Case: 'Корпус' };

        function init() {
            renderComponents();
            updateUI();
            addLog('🎮 Добро пожаловать в Сборщик ПК!', 'info');
            addLog('Соберите совместимые комплектующие и продайте ПК!', 'info');
        }

        function renderComponents() {
            const level = levels[currentLevel];
            const container = document.getElementById('componentsList');
            let html = '';

            for (const [category, items] of Object.entries(level.components)) {
                html += `<div class="component-category">
                    <div class="category-title" onclick="toggleCategory('${category}')">
                        ${categoryIcons[category]} ${categoryNames[category]} <span id="arrow-${category}">▼</span>
                    </div>
                    <div id="items-${category}">`;
                
                for (const item of items) {
                    const isIncompatible = checkIncompatibility(category, item);
                    const isSelected = selectedComponents[category]?.id === item.id;
                    html += `<div class="component-item ${isSelected ? 'selected' : ''} ${isIncompatible ? 'incompatible' : ''}" 
                             onclick="${isIncompatible ? '' : `selectComponent('${category}', '${item.id}')`}">
                        <div>
                            <div class="component-name">${item.name}</div>
                            <div class="component-specs">${getSpecsString(category, item)}</div>
                            ${isIncompatible ? `<div style="color:#ef4444;font-size:0.65rem;margin-top:3px;">⚠️ Несовместимо</div>` : ''}
                        </div>
                        <div class="component-price">${item.price.toLocaleString()} ₽</div>
                    </div>`;
                }
                
                html += `</div></div>`;
            }

            container.innerHTML = html;
        }

        function checkIncompatibility(category, item) {
            const sel = selectedComponents;
            
            if (category === 'Motherboard' && sel.CPU) {
                if (sel.CPU.socket !== item.socket) return true;
            }
            if (category === 'RAM' && sel.Motherboard) {
                if (sel.Motherboard.ramType !== item.type) return true;
            }
            if (category === 'CPU' && sel.Motherboard) {
                if (item.socket !== sel.Motherboard.socket) return true;
            }
            if (category === 'Motherboard' && sel.RAM) {
                if (item.ramType !== sel.RAM.type) return true;
            }
            return false;
        }

        function getSpecsString(category, item) {
            switch(category) {
                case 'CPU': return `${item.cores} ядер, ${item.freq}, Socket ${item.socket}`;
                case 'Motherboard': return `Socket ${item.socket}, ${item.ramType}`;
                case 'RAM': return item.type;
                case 'GPU': return item.isIntegrated ? 'Встроенная графика' : item.vram;
                case 'SSD': return item.size;
                case 'PSU': return `${item.watt}W`;
                default: return '';
            }
        }

        function toggleCategory(category) {
            const items = document.getElementById(`items-${category}`);
            const arrow = document.getElementById(`arrow-${category}`);
            items.style.display = items.style.display === 'none' ? 'block' : 'none';
            arrow.textContent = items.style.display === 'none' ? '▶' : '▼';
        }

        function selectComponent(category, itemId) {
            const level = levels[currentLevel];
            const item = level.components[category].find(i => i.id === itemId);
            
            if (selectedComponents[category]?.id === itemId) {
                selectedComponents[category] = null;
            } else {
                selectedComponents[category] = item;
            }
            
            renderComponents();
            updateUI();
            updatePCVisual();
        }

        function getCompatibility() {
            const sel = selectedComponents;
            const issues = [];
            
            if (sel.CPU && sel.Motherboard) {
                if (sel.CPU.socket !== sel.Motherboard.socket) {
                    issues.push('CPU и Motherboard несовместимы (разные сокеты)');
                }
            }
            
            if (sel.Motherboard && sel.RAM) {
                if (sel.Motherboard.ramType !== sel.RAM.type) {
                    issues.push('RAM и Motherboard несовместимы (DDR4 ≠ DDR5)');
                }
            }
            
            return issues;
        }

        function updateUI() {
            const level = levels[currentLevel];
            document.getElementById('levelBadge').textContent = `🎮 Уровень ${currentLevel + 1}: ${level.name}`;
            
            const total = getTotalPrice();
            const money = level.budget + totalMoney;
            const remaining = money - total;
            
            const moneyDisplay = document.getElementById('moneyDisplay');
            moneyDisplay.textContent = `💰 Деньги: ${remaining.toLocaleString()} ₽`;
            moneyDisplay.className = 'money-display';
            if (remaining < 0) moneyDisplay.classList.add('danger');
            else if (remaining < level.budget * 0.2) moneyDisplay.classList.add('warning');
            
            document.getElementById('totalPrice').textContent = `${total.toLocaleString()} ₽`;
            document.getElementById('totalPrice').style.color = remaining < 0 ? '#ef4444' : '#f59e0b';
            
            // Update selected list
            const list = document.getElementById('selectedList');
            let html = '';
            const compatIssues = getCompatibility();
            
            for (const [cat, item] of Object.entries(selectedComponents)) {
                const hasIssue = compatIssues.some(i => i.includes(cat));
                html += `<div class="selected-item ${hasIssue ? 'incompatible' : ''}">
                    <span>${categoryIcons[cat]} ${categoryNames[cat]}:</span>
                    <span>${item ? item.name : '-'}</span>
                </div>`;
            }
            list.innerHTML = html;
            
            // Check if PC is complete and compatible
            const isComplete = Object.values(selectedComponents).every(c => c !== null);
            const isWithinBudget = remaining >= 0;
            const isCompatible = compatIssues.length === 0;
            
            const canBuild = isComplete && isWithinBudget && isCompatible;
            
            document.getElementById('powerBtn').disabled = !canBuild;
            document.getElementById('sellBtn').disabled = !canBuild;
        }

        function getTotalPrice() {
            return Object.values(selectedComponents).reduce((sum, item) => sum + (item?.price || 0), 0);
        }

        function updatePCVisual() {
            const led = document.getElementById('pcLed');
            const msg = document.getElementById('compatMsg');
            const compatIssues = getCompatibility();
            const isComplete = Object.values(selectedComponents).every(c => c !== null);
            
            if (!isComplete) {
                const selected = Object.values(selectedComponents).filter(c => c !== null);
                led.className = 'pc-led';
                msg.textContent = `Собрано: ${selected.length}/7 компонентов`;
                msg.className = 'compatibility-msg';
            } else if (compatIssues.length > 0) {
                led.className = 'pc-led incompatible';
                msg.textContent = '⚠️ ' + compatIssues[0];
                msg.className = 'compatibility-msg error';
            } else {
                led.className = 'pc-led';
                msg.textContent = '✅ Все компоненты совместимы!';
                msg.className = 'compatibility-msg ok';
            }
        }

        function testPC() {
            const btn = document.getElementById('powerBtn');
            const led = document.getElementById('pcLed');
            
            btn.disabled = true;
            btn.textContent = '⏳ ТЕСТИРУЕТСЯ...';
            addLog('⚡ Запуск ПК...', 'info');
            
            setTimeout(() => {
                led.classList.add('on');
                addLog('✅ ПК запущен успешно!', 'success');
            }, 1000);
            
            setTimeout(() => {
                btn.textContent = '✅ ТЕСТ ПРОЙДЕН!';
                btn.classList.add('success');
                addLog('🧪 Все тесты пройдены! Можно продавать!', 'success');
            }, 2500);
        }

        function sellPC() {
            const level = levels[currentLevel];
            const total = getTotalPrice();
            const profit = Math.round(total * level.sellMultiplier);
            const earnings = profit - total;
            
            totalMoney += earnings;
            
            const popup = document.getElementById('resultPopup');
            document.getElementById('resultEmoji').textContent = earnings >= 0 ? '💰' : '💸';
            document.getElementById('resultTitle').textContent = earnings >= 0 ? 'ПК ПРОДАН!' : 'УБЫТОК!';
            document.getElementById('resultText').textContent = `Продано за ${profit.toLocaleString()} ₽ (куплено за ${total.toLocaleString()} ₽)`;
            
            const moneyEl = document.getElementById('resultMoney');
            moneyEl.textContent = `${earnings >= 0 ? '+' : ''}${earnings.toLocaleString()} ₽`;
            moneyEl.className = 'result-money' + (earnings < 0 ? ' negative' : '');
            
            addLog(`💰 Продан за ${profit.toLocaleString()} ₽ (${earnings >= 0 ? '+' : ''}${earnings.toLocaleString()} ₽)`, earnings >= 0 ? 'success' : 'error');
            
            // Show/hide next button
            const nextBtn = document.getElementById('nextBtn');
            if (currentLevel >= levels.length - 1) {
                nextBtn.textContent = '🏆 ФИНАЛ';
                nextBtn.onclick = showWinScreen;
            } else {
                nextBtn.textContent = '📢 СЛЕДУЮЩИЙ УРОВЕНЬ';
                nextBtn.onclick = nextLevel;
            }
            
            popup.classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultPopup').classList.remove('show');
        }

        function nextLevel() {
            currentLevel++;
            resetForLevel();
            document.getElementById('resultPopup').classList.remove('show');
            addLog(`🎮 Уровень ${currentLevel + 1}: ${levels[currentLevel].name}`, 'info');
        }

        function resetForLevel() {
            selectedComponents = { CPU: null, Motherboard: null, RAM: null, GPU: null, SSD: null, PSU: null, Case: null };
            
            const btn = document.getElementById('powerBtn');
            btn.disabled = true;
            btn.textContent = '⚡️ ВКЛЮЧИТЬ И ТЕСТИРОВАТЬ';
            btn.classList.remove('success');
            
            document.getElementById('pcLed').className = 'pc-led';
            
            renderComponents();
            updateUI();
            updatePCVisual();
        }

        function showWinScreen() {
            const totalEarned = totalMoney;
            document.getElementById('winStats').textContent = `Всего заработано: ${totalEarned.toLocaleString()} ₽`;
            document.getElementById('winScreen').classList.add('show');
            document.getElementById('resultPopup').classList.remove('show');
        }

        function restartGame() {
            currentLevel = 0;
            totalMoney = 0;
            document.getElementById('winScreen').classList.remove('show');
            resetForLevel();
            addLog('🔄 Игра начата заново!', 'info');
        }

        function addLog(message, type = '') {
            const logBox = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            const typeClass = type ? `log-${type}` : '';
            logBox.innerHTML = `<div class="log-entry ${typeClass}">[${time}] ${message}</div>` + logBox.innerHTML;
        }

        init();
    </script>
</body>
</html>
